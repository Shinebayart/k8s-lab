apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: userapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: shinee8241/k8s-lab:backend
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: postgresql://labuser:labpass@db-service:5432/labdb
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: userapp
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP