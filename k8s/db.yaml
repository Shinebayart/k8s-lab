apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: userapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: postgres
          image: shinee8241/k8s-lab:db
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: labuser
            - name: POSTGRES_PASSWORD
              value: labpass
            - name: POSTGRES_DB
              value: labdb
---
apiVersion: v1
kind: Service
metadata:
  name: db-service
  namespace: userapp
spec:
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP