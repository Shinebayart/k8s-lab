networks:
  app_net:
    driver: bridge

volumes:
  pg_data:

services:

  # ── 1. PostgreSQL Database ────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: lab_db
    environment:
      POSTGRES_USER: labuser
      POSTGRES_PASSWORD: labpass
      POSTGRES_DB: labdb
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labuser -d labdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── 2. Backend – FastAPI ──────────────────────────────────
  backend:
    build: ./backend
    container_name: lab_backend
    environment:
      DATABASE_URL: postgresql://labuser:labpass@db:5432/labdb
    ports:
      - "8000:8000"
    networks:
      - app_net
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── 3. Frontend – Nginx + Static HTML ────────────────────
  frontend:
    build: ./frontend
    container_name: lab_frontend
    ports:
      - "3000:80"
    networks:
      - app_net
    depends_on:
      - backend
    restart: unless-stopped
